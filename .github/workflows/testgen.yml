# CI/CD workflow для testgen-agent.
# Запускается на self-hosted runner (Windows) с локальной Ollama.
#
# Триггер: PR в main, изменения в .go файлах (кроме _test.go).

name: Testgen — AI Test Generation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.go'
      - '!**_test.go'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    runs-on: self-hosted

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install goimports
        shell: pwsh
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Build testgen-agent
        shell: pwsh
        run: go build -o testgen-agent.exe ./cmd/agent/

      - name: Fetch base branch
        shell: pwsh
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Check Ollama availability
        shell: pwsh
        run: |
          try {
            $response = Invoke-RestMethod -Uri "http://localhost:11434/v1/models" -Method Get
            Write-Host "✅ Ollama доступна. Модели: $($response.data.id -join ', ')"
          } catch {
            Write-Host "⚠️ Ollama не запущена!"
          }

      - name: Run testgen-agent
        shell: pwsh
        run: |
          ./testgen-agent.exe --repo . --base "origin/${{ github.base_ref }}" --api-url http://localhost:11434/v1 --model qwen2.5-coder:14b

      - name: Show generated tests
        shell: pwsh
        run: |
          git diff --name-only
          git diff --stat

      - name: Commit generated tests
        shell: pwsh
        run: |
          git config user.name "testgen-agent[bot]"
          git config user.email "testgen-agent[bot]@users.noreply.github.com"

          git add *_test.go 2>$null

          $staged = git diff --cached --quiet 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "ℹ️ Нет новых тестов для коммита"
          } else {
            git commit -m "🤖 testgen-agent: auto-generated tests"
            git push
            Write-Host "✅ Тесты закоммичены и запушены"
          }
