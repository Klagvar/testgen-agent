# CI/CD workflow for testgen-agent.
# Runs on a self-hosted runner (Windows) with local Ollama.
#
# Trigger: PR to main, changes in .go files (excluding _test.go).

name: Testgen — AI Test Generation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.go'
      - '!**_test.go'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    runs-on: self-hosted

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install goimports
        shell: pwsh
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Build testgen-agent
        shell: pwsh
        run: go build -o testgen-agent.exe ./cmd/agent/

      - name: Fetch base branch
        shell: pwsh
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Check Ollama availability
        shell: pwsh
        run: |
          try {
            $response = Invoke-RestMethod -Uri "http://localhost:11434/v1/models" -Method Get
            Write-Host "✅ Ollama is available. Models: $($response.data.id -join ', ')"
          } catch {
            Write-Host "⚠️ Ollama is not running!"
          }

      - name: Run testgen-agent
        id: generate
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./testgen-agent.exe `
            --repo . `
            --base "origin/${{ github.base_ref }}" `
            --api-url http://localhost:11434/v1 `
            --model qwen3-coder:30b `
            --report json `
            --github-token "${{ secrets.GITHUB_TOKEN }}" `
            --github-repo "${{ github.repository }}" `
            --pr-number ${{ github.event.pull_request.number }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testgen-report-html
          path: testgen-report-*.html
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testgen-report-json
          path: testgen-report-*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Show generated tests
        if: always()
        shell: pwsh
        run: |
          git diff --name-only
          git diff --stat

      - name: Commit generated tests
        if: success()
        shell: pwsh
        run: |
          git config user.name "testgen-agent[bot]"
          git config user.email "testgen-agent[bot]@users.noreply.github.com"

          git add -A -- '*_test.go' '**/*_test.go' 2>$null

          $staged = git diff --cached --quiet 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "ℹ️ No new tests to commit"
          } else {
            git commit -m "🤖 testgen-agent: auto-generated tests"
            git push
            Write-Host "✅ Tests committed and pushed"
          }

      - name: Report failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "⚠️ Test generation finished with errors."
          Write-Host "Check the 'Run testgen-agent' step logs for details."
          Write-Host "Invalid tests were NOT committed."