# CI/CD workflow для testgen-agent.
# Запускается на self-hosted runner (твой комп) с локальной Ollama.
#
# Триггер: PR в main, изменения в .go файлах (кроме _test.go).

name: Testgen — AI Test Generation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.go'
      - '!**_test.go'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    runs-on: self-hosted

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Build testgen-agent
        run: go build -o testgen-agent.exe ./cmd/agent/

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Check Ollama availability
        run: |
          curl -s http://localhost:11434/v1/models || echo "⚠️ Ollama не запущена!"

      - name: Run testgen-agent
        run: |
          ./testgen-agent.exe --repo . --base origin/${{ github.base_ref }} --api-url http://localhost:11434/v1 --model qwen2.5-coder:14b

      - name: Show generated tests
        run: |
          git diff --name-only
          git diff --stat

      - name: Commit generated tests
        run: |
          git config user.name "testgen-agent[bot]"
          git config user.email "testgen-agent[bot]@users.noreply.github.com"

          git add -A '*_test.go' || true

          if git diff --cached --quiet; then
            echo "ℹ️ Нет новых тестов для коммита"
          else
            git commit -m "🤖 testgen-agent: auto-generated tests"
            git push
          fi
